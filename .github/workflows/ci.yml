name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gateway,dev]"
      - name: Run lint
        run: python -m ruff check .
      - name: Run tests
        run: python -m pytest -q
      - name: Run release gate
        run: python scripts/validate_release.py
      - name: Run eval suites
        run: |
          python -m ghostchimera.evals run --suite smoke
          python -m ghostchimera.evals run --suite safety
          python -m ghostchimera.evals run --suite autonomy
          python -m ghostchimera.evals run --suite user-journey
      - name: Build package
        run: |
          python -m build
      - name: Smoke base wheel
        run: python scripts/smoke_installed_wheel.py
      - name: Smoke gateway wheel
        run: python scripts/smoke_installed_wheel.py --extras gateway
